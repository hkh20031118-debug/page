<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解诗锦生日快乐</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
  text-align:center;
  overflow:hidden;
}

.page{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  top:0;left:0;
  padding:40px 20px;
}

.active{display:block}

img{
  width:220px;
  border-radius:20px;
  margin:20px 0;
}

/* 返回按钮 */
.back{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 24px;
  background:#ff4d6d;
  color:#fff;
  border-radius:25px;
  z-index:9999;
}

/* 播放按钮 */
.music-btn{
  position:fixed;
  top:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  z-index:9999;
}

.tip{
  position:fixed;
  bottom:80px;
  width:100%;
  font-size:14px;
  opacity:0.7;
}

/* ❤️ 爱心动画 */
.heart{
  position:fixed;
  animation:fall linear forwards;
}
@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<!-- 🔙 返回 -->
<div class="back" onclick="goBack(event)">返回上一页</div>

<!-- 🎵 播放按钮 -->
<div class="music-btn" onclick="playMusic(event)">🎵 播放</div>

<!-- 页面 -->
<div class="page active">
  <h2>🎁 给你准备了一个小惊喜</h2>
  <img src="img1.jpg">
  <div>点一下继续 👇</div>
</div>

<div class="page">
  <h2>✨ 想对你说的话</h2>
  <img src="img2.jpg">
</div>

<div class="page">
  <h2>🌙 还有一件事</h2>
  <img src="img3.jpg">
</div>

<div class="page">
  <h2>🎂 解诗锦 23岁生日快乐呀🥳</h2>
  <img src="final.jpg">
  <div>
    愿你一直被爱包围 💖<br>
    —— 希望你的每一天都有人偷偷为你心动
  </div>
</div>

<div class="tip">（点击屏幕继续）</div>

<!-- 🎵 音频 -->
<audio id="bgm" loop>
  <source src="1.mp3">
</audio>

<script>

let current=0;
const pages=document.querySelectorAll(".page");
let heartStarted=false;

// 👉 点击翻页
document.body.addEventListener("click",function(e){

  if(e.target.classList.contains("back") || e.target.classList.contains("music-btn")) return;

  pages[current].classList.remove("active");
  current++;

  if(current>=pages.length){
    current=pages.length-1;
  }

  pages[current].classList.add("active");

  // 💖 最后一页开启爱心
  if(current===pages.length-1 && !heartStarted){
    heartRain();
    heartStarted=true;
  }

});

// 🔙 返回
function goBack(e){
  e.stopPropagation();

  if(current===0) return;

  pages[current].classList.remove("active");
  current--;
  pages[current].classList.add("active");
}

// 🎵 播放音乐
function playMusic(e){
  e.stopPropagation();
  bgm.play();
}

// ❤️ 爱心雨（补回来了）
function heartRain(){
  setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*10+14)+"px";
    h.style.animationDuration=(Math.random()*2+3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  },200);
}

</script>

</body>
</html>
