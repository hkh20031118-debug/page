<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解诗锦生日快乐</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
  text-align:center;
  overflow:hidden;
}

.page{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  top:0;left:0;
  padding:40px 20px;
}

.active{display:block}

img{
  width:220px;
  border-radius:20px;
  margin:20px 0;
}

h2{margin-top:40px}

.tip{
  position:fixed;
  bottom:30px;
  width:100%;
  font-size:14px;
  opacity:0.7;
}

.back{
  position:fixed;
  top:20px;
  left:20px;
  padding:6px 12px;
  background:#fff;
  color:#000;
  border-radius:10px;
  font-size:14px;
}

/* 爱心动画 */
.heart{
  position:fixed;
  animation:fall linear forwards;
}
@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<!-- 🔙 返回按钮 -->
<div class="back" onclick="goBack()">← 返回</div>

<!-- 🎁 页面1 -->
<div class="page active">
  <h2>🎁 给你准备了一个小惊喜</h2>
  <img src="img1.jpg">
  <div>点一下，有个东西想给你听 🎵</div>
</div>

<!-- 🎁 页面2 -->
<div class="page">
  <h2>✨ 想对你说的话</h2>
  <img src="img2.jpg">
  <div>今天一定要开心 💖</div>
</div>

<!-- 🎁 页面3 -->
<div class="page">
  <h2>🌙 还有一件很重要的事</h2>
  <img src="img3.jpg">
  <div>因为今天很特别…</div>
</div>

<!-- 🎂 最后一页 -->
<div class="page">
  <h2>🎂 解诗锦 23岁生日快乐</h2>
  <img src="final.jpg">
  <div>
    愿你一直被爱包围 💖<br>
    每一天都闪闪发光 ✨<br><br>
    —— 生日快乐，希望你的每一天都有人偷偷为你心动
  </div>
</div>

<div class="tip" id="tip">（点击屏幕继续）</div>

<!-- 🎵 音乐（已经改成你的 1.mp3） -->
<audio id="bgm" loop>
  <source src="1.mp3">
</audio>

<script>

let current=0;
const pages=document.querySelectorAll(".page");

// 👉 点击切换页面
document.body.addEventListener("click",(e)=>{
  if(e.target.classList.contains("back")) return;

  pages[current].classList.remove("active");
  current++;

  if(current>=pages.length){
    current=pages.length-1;
  }

  pages[current].classList.add("active");

  // 🎵 第一次点击播放音乐
  if(current === 1){
    bgm.play();
  }

  // 🎂 最后一页效果
  if(current===pages.length-1){
    heartRain();
    document.getElementById("tip").style.display="none";
  }
});

// 🔙 返回功能
function goBack(){
  if(current===0) return;

  pages[current].classList.remove("active");
  current--;
  pages[current].classList.add("active");

  document.getElementById("tip").style.display="block";
}

// 💖 爱心雨
function heartRain(){
  setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*10+14)+"px";
    h.style.animationDuration=(Math.random()*2+3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  },200);
}

</script>

</body>
</html>
