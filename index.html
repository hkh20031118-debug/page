<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解诗锦生日快乐呀</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
  text-align:center;
  overflow:hidden;
}

.page{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  top:0;left:0;
  padding:40px 20px;
}

.active{display:block}

img{
  width:220px;
  border-radius:20px;
  margin:20px 0;
}

h2{margin-top:40px}

.tip{
  position:fixed;
  bottom:30px;
  width:100%;
  font-size:14px;
  opacity:0.7;
}

/* 爱心 */
.heart{
  position:fixed;
  animation:fall linear forwards;
}
@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<!-- 页面1 -->
<div class="page active">
  <h2>🎁 有一个小惊喜给你</h2>
  <img src="https://cdn.jsdelivr.net/gh/zhheo/JS-CDN@main/linet-dog/1.png">
  <div>点一下继续 👇</div>
</div>

<!-- 页面2 -->
<div class="page">
  <h2>🐶 这只小狗想对你说</h2>
  <img src="https://cdn.jsdelivr.net/gh/zhheo/JS-CDN@main/linet-dog/2.png">
  <div>你今天一定要开心 💖</div>
</div>

<!-- 页面3 -->
<div class="page">
  <h2>✨ 还有一件很重要的事</h2>
  <img src="https://cdn.jsdelivr.net/gh/zhheo/JS-CDN@main/linet-dog/3.png">
  <div>因为今天很特别…</div>
</div>

<!-- 页面4（最终页） -->
<div class="page">
  <h2>🎂 解诗锦 23岁生日快乐</h2>
  <img src="https://cdn.jsdelivr.net/gh/zhheo/JS-CDN@main/linet-dog/birthday.png">
  <div>
    愿你永远被爱 包围<br>
    永远做自己的光 ✨<br><br>
    💖 生日快乐 💖
  </div>
</div>

<div class="tip">（点击屏幕继续）</div>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2021/01/27/audio_99c7b0e2d3.mp3">
</audio>

<script>

let current=0;
const pages=document.querySelectorAll(".page");

document.body.addEventListener("click",()=>{

  pages[current].classList.remove("active");
  current++;

  if(current>=pages.length){
    current=pages.length-1;
  }

  pages[current].classList.add("active");

  // 到最后一页播放音乐
  if(current===pages.length-1){
    bgm.play();
    heartRain();
  }

});

// 爱心雨
function heartRain(){
  setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*10+14)+"px";
    h.style.animationDuration=(Math.random()*2+3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  },200);
}

</script>

</body>
</html>
